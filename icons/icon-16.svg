<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="16" height="16">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <!-- Trash can body -->
  <rect x="11" y="16" width="26" height="26" rx="3" fill="url(#g1)" opacity="0.9"/>
  <!-- Lid -->
  <rect x="8" y="12" width="32" height="4" rx="2" fill="url(#g1)"/>
  <!-- Handle -->
  <rect x="18" y="8" width="12" height="4" rx="2" fill="url(#g1)"/>
  <!-- Lines on can -->
  <line x1="18" y1="22" x2="18" y2="36" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="22" x2="24" y2="36" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="22" x2="30" y2="36" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Sparkle / broom effect -->
  <circle cx="40" cy="8" r="2.5" fill="#f5576c"/>
  <circle cx="36" cy="4" r="1.5" fill="#fee140"/>
  <circle cx="43" cy="13" r="1.5" fill="#fa709a"/>
</svg>
