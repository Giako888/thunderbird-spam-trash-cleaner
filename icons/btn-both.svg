<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Both: Trash + Spam - Purple gradient -->
  <defs>
    <linearGradient id="gb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b1fa2"/>
      <stop offset="100%" style="stop-color:#e53935"/>
    </linearGradient>
  </defs>
  <circle cx="8" cy="8" r="7" fill="url(#gb)"/>
  <!-- Trash icon small -->
  <rect x="4" y="5.5" width="4" height="5" rx="0.5" fill="#fff" opacity="0.9"/>
  <rect x="3.5" y="4.5" width="5" height="1.2" rx="0.5" fill="#fff" opacity="0.9"/>
  <!-- Exclamation small -->
  <text x="12" y="11.5" text-anchor="middle" fill="#fff" font-size="7" font-weight="bold" font-family="sans-serif">!</text>
</svg>
