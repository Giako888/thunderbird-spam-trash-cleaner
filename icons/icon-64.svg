<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <!-- Trash can body -->
  <rect x="14" y="21" width="36" height="35" rx="4" fill="url(#g1)" opacity="0.9"/>
  <!-- Lid -->
  <rect x="10" y="16" width="44" height="5" rx="2.5" fill="url(#g1)"/>
  <!-- Handle -->
  <rect x="24" y="10" width="16" height="6" rx="3" fill="url(#g1)"/>
  <!-- Lines on can -->
  <line x1="24" y1="29" x2="24" y2="48" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="29" x2="32" y2="48" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="29" x2="40" y2="48" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sparkle / broom effect -->
  <circle cx="54" cy="10" r="3.5" fill="#f5576c"/>
  <circle cx="49" cy="5" r="2" fill="#fee140"/>
  <circle cx="58" cy="17" r="2" fill="#fa709a"/>
</svg>
